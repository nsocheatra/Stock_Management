services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stock-management-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://backend:4000
    depends_on:
      - backend

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: stock-management-backend
    ports:
      - "4000:4000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - PORT=4000
      - CORS_ORIGIN=http://frontend:3000
    volumes:
      - ./dev.db:/app/dev.db
      - ./dev.db-shm:/app/dev.db-shm
      - ./dev.db-wal:/app/dev.db-wal
